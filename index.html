<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>모바일 시선 추적</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #fff;
    touch-action: none;
  }
  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
  }
  #quadrants {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 2px;
    background: #2a2a2a;
  }
  .quad {
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    font-weight: 700;
    color: #444;
    transition: background 0.15s, color 0.15s;
    position: relative;
  }
  .quad.active { background: #2563eb; color: #fff; }
  .quad-label {
    position: absolute; top: 12px; left: 12px;
    font-size: 11px; font-weight: 500; color: #666; letter-spacing: 1px;
  }
  .quad.active .quad-label { color: rgba(255,255,255,0.7); }
  .gaze-time {
    position: absolute; bottom: 12px; right: 12px;
    font-size: 14px; color: #666; font-variant-numeric: tabular-nums;
  }
  .quad.active .gaze-time { color: rgba(255,255,255,0.8); }

  #panel {
    background: #0a0a0a;
    border-top: 1px solid #2a2a2a;
    padding: 12px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  #status {
    flex: 1; font-size: 12px; color: #888; line-height: 1.4;
  }
  #status.ok { color: #4ade80; }
  #status.err { color: #ef4444; }
  button {
    padding: 10px 16px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  button:disabled { background: #374151; opacity: 0.6; }
  button.secondary { background: #374151; }

  #preview {
    position: fixed;
    top: 12px; right: 12px;
    width: 100px; height: 130px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #2a2a2a;
    background: #000;
    z-index: 100;
    display: none;
  }
  #preview.on { display: block; }
  #video, #overlay {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    transform: scaleX(-1);
  }

  #intro {
    position: fixed; inset: 0;
    background: rgba(10,10,10,0.98);
    z-index: 1000;
    display: flex;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .intro-card { max-width: 360px; text-align: center; }
  .intro-card h1 { font-size: 22px; margin-bottom: 16px; }
  .intro-card p {
    color: #aaa; font-size: 14px; line-height: 1.6; margin-bottom: 20px;
  }
  .intro-card ul {
    text-align: left; color: #888; font-size: 13px;
    line-height: 1.8; margin-bottom: 20px; padding-left: 20px;
  }
  .intro-card button { width: 100%; padding: 14px; font-size: 15px; }

  /* 에러/로그 출력 박스 */
  #log {
    position: fixed;
    left: 12px; right: 12px; bottom: 80px;
    max-height: 200px;
    overflow-y: auto;
    background: rgba(0,0,0,0.85);
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 10px;
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 11px;
    color: #4ade80;
    z-index: 2000;
    display: none;
    white-space: pre-wrap;
    word-break: break-all;
  }
  #log.show { display: block; }
  #log .err { color: #ef4444; }
  #log .warn { color: #f59e0b; }

  /* 튜닝 패널 */
  #tune-panel {
    position: fixed;
    left: 12px; right: 12px; bottom: 80px;
    background: rgba(0,0,0,0.92);
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 12px;
    z-index: 1500;
    display: none;
  }
  #tune-panel.show { display: block; }
  .tune-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 12px;
    color: #ccc;
  }
  .tune-row:last-child { margin-bottom: 0; }
  .tune-row label {
    flex: 0 0 120px;
    display: flex;
    justify-content: space-between;
    gap: 4px;
  }
  .tune-row label span {
    color: #4ade80;
    font-variant-numeric: tabular-nums;
  }
  .tune-row input[type=range] {
    flex: 1;
    accent-color: #2563eb;
  }
  .tune-row input[type=checkbox] {
    margin-right: 6px;
    accent-color: #2563eb;
  }
</style>
</head>
<body>

<div id="app">
  <div id="quadrants">
    <div class="quad" data-q="TL">
      <span class="quad-label">좌상</span><span>↖</span>
      <span class="gaze-time">0.0s</span>
    </div>
    <div class="quad" data-q="TR">
      <span class="quad-label">우상</span><span>↗</span>
      <span class="gaze-time">0.0s</span>
    </div>
    <div class="quad" data-q="BL">
      <span class="quad-label">좌하</span><span>↙</span>
      <span class="gaze-time">0.0s</span>
    </div>
    <div class="quad" data-q="BR">
      <span class="quad-label">우하</span><span>↘</span>
      <span class="gaze-time">0.0s</span>
    </div>
  </div>

  <div id="panel">
    <div id="status">대기 중</div>
    <button id="toggle-preview" class="secondary">카메라</button>
    <button id="toggle-log" class="secondary">로그</button>
    <button id="toggle-tune" class="secondary">튜닝</button>
    <button id="reset-btn" class="secondary">리셋</button>
  </div>
</div>

<div id="tune-panel">
  <div class="tune-row">
    <label>Y 민감도 <span id="v-eyeY">2.5</span></label>
    <input type="range" id="s-eyeY" min="0.5" max="5" step="0.1" value="2.5">
  </div>
  <div class="tune-row">
    <label>머리 끄덕임 <span id="v-pitch">2.0</span></label>
    <input type="range" id="s-pitch" min="0" max="5" step="0.1" value="2.0">
  </div>
  <div class="tune-row">
    <label>Y 중심 보정 <span id="v-yoff">-0.15</span></label>
    <input type="range" id="s-yoff" min="-0.4" max="0.4" step="0.01" value="-0.15">
  </div>
  <div class="tune-row">
    <label>X 민감도 <span id="v-eyeX">1.0</span></label>
    <input type="range" id="s-eyeX" min="0.5" max="3" step="0.1" value="1.0">
  </div>
  <div class="tune-row">
    <label>머리 좌우 <span id="v-yaw">0.8</span></label>
    <input type="range" id="s-yaw" min="0" max="3" step="0.1" value="0.8">
  </div>
  <div class="tune-row">
    <label><input type="checkbox" id="c-flipx" checked> 좌우 반전 (거울)</label>
  </div>
</div>

<div id="preview">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<div id="intro">
  <div class="intro-card">
    <h1>👁️ 모바일 시선 추적</h1>
    <p>전면 카메라로 얼굴/홍채를 추적해서<br>화면의 4분면 중 어디를 보는지 표시합니다.</p>
    <ul>
      <li>폰을 정면에서 30~40cm</li>
      <li>밝은 조명, 안경 반사 주의</li>
      <li>머리는 가급적 고정</li>
      <li>처음 시작 시 모델 다운로드 5~15초</li>
    </ul>
    <button id="start-btn">카메라 시작</button>
  </div>
</div>

<div id="log"></div>

<script>
// ========== 로깅 (화면에 표시) ==========
const logEl = document.getElementById('log');
function log(msg, type = 'info') {
  const line = document.createElement('div');
  line.className = type;
  const time = new Date().toLocaleTimeString('ko-KR');
  line.textContent = `[${time}] ${msg}`;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
  console.log(`[${type}]`, msg);
}

// 글로벌 에러 캐치
window.addEventListener('error', (e) => {
  log(`ERROR: ${e.message} @ ${e.filename}:${e.lineno}`, 'err');
  logEl.classList.add('show');
});
window.addEventListener('unhandledrejection', (e) => {
  log(`PROMISE REJECT: ${e.reason}`, 'err');
  logEl.classList.add('show');
});

// ========== 환경 체크 ==========
log('페이지 로드 완료');
log(`UA: ${navigator.userAgent.substring(0, 80)}...`);
log(`Protocol: ${location.protocol}`);

if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
  log('⚠ HTTPS가 아닙니다. 카메라 접근 차단될 수 있음', 'warn');
  logEl.classList.add('show');
}
if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
  log('⚠ getUserMedia 미지원 브라우저', 'err');
  logEl.classList.add('show');
}

// ========== UI 핸들러 (즉시 등록) ==========
const startBtn = document.getElementById('start-btn');
const resetBtn = document.getElementById('reset-btn');
const togglePreviewBtn = document.getElementById('toggle-preview');
const toggleLogBtn = document.getElementById('toggle-log');
const statusEl = document.getElementById('status');
const intro = document.getElementById('intro');
const preview = document.getElementById('preview');
const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const octx = overlay.getContext('2d');

const quads = {
  TL: document.querySelector('[data-q="TL"]'),
  TR: document.querySelector('[data-q="TR"]'),
  BL: document.querySelector('[data-q="BL"]'),
  BR: document.querySelector('[data-q="BR"]'),
};

toggleLogBtn.addEventListener('click', () => logEl.classList.toggle('show'));
togglePreviewBtn.addEventListener('click', () => preview.classList.toggle('on'));

// 튜닝 패널
const tunePanel = document.getElementById('tune-panel');
const toggleTuneBtn = document.getElementById('toggle-tune');
toggleTuneBtn.addEventListener('click', () => tunePanel.classList.toggle('show'));

function bindSlider(id, paramKey, valueId) {
  const slider = document.getElementById(id);
  const display = document.getElementById(valueId);
  slider.addEventListener('input', () => {
    const v = parseFloat(slider.value);
    GAZE_PARAMS[paramKey] = v;
    display.textContent = v.toFixed(2);
  });
}
// GAZE_PARAMS는 아래에 정의되지만, 슬라이더는 시작 후 동작하므로 OK
setTimeout(() => {
  bindSlider('s-eyeY', 'eyeYGain', 'v-eyeY');
  bindSlider('s-pitch', 'headPitchGain', 'v-pitch');
  bindSlider('s-yoff', 'yCenterOffset', 'v-yoff');
  bindSlider('s-eyeX', 'eyeXGain', 'v-eyeX');
  bindSlider('s-yaw', 'headYawGain', 'v-yaw');
  document.getElementById('c-flipx').addEventListener('change', (e) => {
    GAZE_PARAMS.flipX = e.target.checked;
  });
}, 0);

let gazeTimes = { TL: 0, TR: 0, BL: 0, BR: 0 };
resetBtn.addEventListener('click', () => {
  gazeTimes = { TL: 0, TR: 0, BL: 0, BR: 0 };
  for (const k of Object.keys(quads)) {
    quads[k].querySelector('.gaze-time').textContent = '0.0s';
  }
  log('통계 리셋');
});

// ========== 메인 로직 ==========
let faceLandmarker = null;
let running = false;
let lastVideoTime = -1;
let currentQuad = null;
let lastTickTime = performance.now();
const smoothBuffer = { x: [], y: [], size: 6 };

function smooth(buf, val) {
  buf.push(val);
  if (buf.length > smoothBuffer.size) buf.shift();
  return buf.reduce((a, b) => a + b, 0) / buf.length;
}

async function loadMediaPipe() {
  log('MediaPipe 모듈 로딩 시작...');
  statusEl.textContent = 'MediaPipe 모듈 다운로드 중...';

  // ES module을 동적 import (catch 가능)
  let vision;
  try {
    vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/vision_bundle.mjs');
    log('vision_bundle 로드 성공');
  } catch (e) {
    log(`vision_bundle 로드 실패: ${e.message}`, 'err');
    throw e;
  }

  const { FilesetResolver, FaceLandmarker } = vision;

  log('WASM fileset 로딩...');
  const filesetResolver = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm"
  );
  log('WASM fileset 로드 성공');

  log('FaceLandmarker 모델 다운로드 (~5MB)...');
  statusEl.textContent = '모델 다운로드 중 (5~15초)...';

  // GPU delegate가 iOS에서 실패하면 CPU로 fallback
  let landmarker;
  try {
    landmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        delegate: "GPU"
      },
      outputFacialTransformationMatrixes: true,
      runningMode: "VIDEO",
      numFaces: 1
    });
    log('FaceLandmarker 생성 성공 (GPU)');
  } catch (e) {
    log(`GPU 실패, CPU로 재시도: ${e.message}`, 'warn');
    landmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        delegate: "CPU"
      },
      outputFacialTransformationMatrixes: true,
      runningMode: "VIDEO",
      numFaces: 1
    });
    log('FaceLandmarker 생성 성공 (CPU)');
  }

  return landmarker;
}

async function startCamera() {
  startBtn.disabled = true;
  startBtn.textContent = '로딩 중...';
  log('=== 시작 버튼 클릭됨 ===');

  try {
    // 1. 먼저 카메라 권한 요청 (사용자 제스처 직후라야 iOS에서 통과)
    log('카메라 권한 요청...');
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: 'user',
        width: { ideal: 640 },
        height: { ideal: 480 }
      },
      audio: false
    });
    log('카메라 권한 획득');
    video.srcObject = stream;

    await new Promise((res, rej) => {
      video.addEventListener('loadeddata', res, { once: true });
      setTimeout(() => rej(new Error('비디오 로딩 타임아웃')), 10000);
    });
    log(`비디오 준비: ${video.videoWidth}x${video.videoHeight}`);

    overlay.width = video.videoWidth;
    overlay.height = video.videoHeight;

    // 2. MediaPipe 로드 (시간 걸리는 작업)
    if (!faceLandmarker) {
      faceLandmarker = await loadMediaPipe();
    }

    // 3. 시작
    intro.style.display = 'none';
    running = true;
    statusEl.textContent = '추적 중';
    statusEl.classList.remove('err');
    statusEl.classList.add('ok');
    log('=== 추적 시작 ===');
    lastTickTime = performance.now();
    requestAnimationFrame(loop);
  } catch (e) {
    log(`시작 실패: ${e.name}: ${e.message}`, 'err');
    logEl.classList.add('show');
    statusEl.textContent = '실패: ' + e.message;
    statusEl.classList.add('err');
    startBtn.disabled = false;
    startBtn.textContent = '다시 시도';
  }
}

// 튜닝 파라미터 — 폰/사용자에 맞게 조정 가능
const GAZE_PARAMS = {
  flipX: true,           // 거울 모드 보정 (좌우 반전)
  eyeXGain: 1.0,         // 눈동자 X 민감도
  eyeYGain: 2.5,         // 눈동자 Y 민감도 (위/아래는 범위가 좁아서 크게)
  headYawGain: 0.8,      // 머리 좌우 회전 가중치
  headPitchGain: 2.0,    // 머리 끄덕임 가중치 (Y도 크게)
  yCenterOffset: -0.15,  // 폰을 살짝 아래로 들어서 정면이 0.5보다 아래로 잡히는 것 보정
};

function estimateGaze(landmarks, matrix) {
  const lIris = landmarks[468];
  const rIris = landmarks[473];
  const lEyeOuter = landmarks[33];
  const lEyeInner = landmarks[133];
  const rEyeInner = landmarks[362];
  const rEyeOuter = landmarks[263];
  const lEyeTop = landmarks[159];
  const lEyeBottom = landmarks[145];
  const rEyeTop = landmarks[386];
  const rEyeBottom = landmarks[374];

  // 눈동자 상대 위치 (0~1)
  const lRelX = (lIris.x - lEyeOuter.x) / (lEyeInner.x - lEyeOuter.x);
  const rRelX = (rIris.x - rEyeInner.x) / (rEyeOuter.x - rEyeInner.x);
  const eyeX = (lRelX + rRelX) / 2;

  const lRelY = (lIris.y - lEyeTop.y) / (lEyeBottom.y - lEyeTop.y);
  const rRelY = (rIris.y - rEyeTop.y) / (rEyeBottom.y - rEyeTop.y);
  const eyeY = (lRelY + rRelY) / 2;

  // 중심(0.5) 기준으로 편차 계산 후 게인 적용
  const eyeDx = (eyeX - 0.5) * GAZE_PARAMS.eyeXGain;
  const eyeDy = (eyeY - 0.5) * GAZE_PARAMS.eyeYGain;

  // 머리 회전
  let headYaw = 0, headPitch = 0;
  if (matrix && matrix.data) {
    const m = matrix.data;
    headYaw = Math.atan2(m[8], m[10]);
    headPitch = Math.atan2(-m[9], Math.sqrt(m[1]*m[1] + m[5]*m[5]));
  }

  // 합성: 중심(0.5) + 눈동자 편차 + 머리 회전
  let screenX = 0.5 + eyeDx + headYaw * GAZE_PARAMS.headYawGain;
  let screenY = 0.5 + eyeDy + headPitch * GAZE_PARAMS.headPitchGain + GAZE_PARAMS.yCenterOffset;

  // 좌우 반전 (거울 모드 보정)
  if (GAZE_PARAMS.flipX) screenX = 1 - screenX;

  // 클램프
  screenX = Math.max(0, Math.min(1, screenX));
  screenY = Math.max(0, Math.min(1, screenY));
  return { x: screenX, y: screenY };
}

function quadrantOf(x, y) {
  const top = y < 0.5;
  const left = x < 0.5;
  if (top && left) return 'TL';
  if (top && !left) return 'TR';
  if (!top && left) return 'BL';
  return 'BR';
}

function updateQuadUI(q) {
  for (const k of Object.keys(quads)) {
    quads[k].classList.toggle('active', k === q);
  }
}

function updateGazeTime(q, deltaSec) {
  gazeTimes[q] += deltaSec;
  quads[q].querySelector('.gaze-time').textContent = gazeTimes[q].toFixed(1) + 's';
}

function drawOverlay(landmarks) {
  octx.clearRect(0, 0, overlay.width, overlay.height);
  if (!landmarks) return;
  octx.fillStyle = '#4ade80';
  for (const idx of [468, 473]) {
    const p = landmarks[idx];
    octx.beginPath();
    octx.arc(p.x * overlay.width, p.y * overlay.height, 4, 0, Math.PI * 2);
    octx.fill();
  }
}

function loop() {
  if (!running) return;
  const now = performance.now();
  const deltaSec = (now - lastTickTime) / 1000;
  lastTickTime = now;

  if (video.currentTime !== lastVideoTime) {
    lastVideoTime = video.currentTime;
    try {
      const result = faceLandmarker.detectForVideo(video, now);
      if (result.faceLandmarks && result.faceLandmarks.length > 0) {
        const landmarks = result.faceLandmarks[0];
        const matrix = result.facialTransformationMatrixes
          ? result.facialTransformationMatrixes[0]
          : null;
        const gaze = estimateGaze(landmarks, matrix);
        const sx = smooth(smoothBuffer.x, gaze.x);
        const sy = smooth(smoothBuffer.y, gaze.y);
        const q = quadrantOf(sx, sy);
        if (q !== currentQuad) {
          currentQuad = q;
          updateQuadUI(q);
        }
        updateGazeTime(q, deltaSec);
        drawOverlay(landmarks);
      } else {
        octx.clearRect(0, 0, overlay.width, overlay.height);
      }
    } catch (e) {
      log(`detect 오류: ${e.message}`, 'err');
    }
  }
  requestAnimationFrame(loop);
}

// 시작 버튼은 마지막에 바인딩 (모든 함수 정의 후)
startBtn.addEventListener('click', startCamera);
log('시작 버튼 핸들러 등록 완료. 버튼을 눌러주세요.');
</script>

</body>
</html>
