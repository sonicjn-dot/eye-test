<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>손 추적 데모</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a; color: #fff; touch-action: none;
  }
  #app { position: fixed; inset: 0; display: flex; flex-direction: column; }

  /* 탭 바 */
  #tabs {
    display: flex;
    background: #0a0a0a;
    border-bottom: 1px solid #2a2a2a;
    flex-shrink: 0;
  }
  .tab {
    flex: 1;
    padding: 14px 8px;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    color: #888;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab.active {
    color: #fff;
    border-bottom-color: #2563eb;
    background: #1a1a1a;
  }

  /* 메인 영역 */
  #stage {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .mode {
    position: absolute;
    inset: 0;
    display: none;
  }
  .mode.active { display: block; }

  /* === 포인터 모드 === */
  #pointer-mode {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 2px;
    background: #2a2a2a;
  }
  .quad {
    background: #1a1a1a;
    display: flex; align-items: center; justify-content: center;
    font-size: 56px; font-weight: 700; color: #444;
    transition: background 0.15s, color 0.15s;
    position: relative;
  }
  .quad.active { background: #2563eb; color: #fff; }
  .quad-label {
    position: absolute; top: 12px; left: 12px;
    font-size: 11px; font-weight: 500; color: #666; letter-spacing: 1px;
  }
  .quad.active .quad-label { color: rgba(255,255,255,0.7); }
  #finger-cursor {
    position: absolute;
    width: 32px; height: 32px;
    background: radial-gradient(circle, #4ade80 30%, rgba(74,222,128,0.4) 70%, transparent);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%,-50%);
    z-index: 30;
    display: none;
    transition: top 0.05s linear, left 0.05s linear;
  }
  #finger-cursor.on { display: block; }
  #finger-cursor.pinch {
    background: radial-gradient(circle, #ef4444 30%, rgba(239,68,68,0.4) 70%, transparent);
    transform: translate(-50%,-50%) scale(1.4);
  }

  /* === 제스처 모드 === */
  #gesture-mode {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #gesture-display {
    text-align: center;
  }
  #gesture-emoji {
    font-size: 200px;
    line-height: 1;
    margin-bottom: 24px;
    filter: grayscale(0.3);
    transition: transform 0.2s;
  }
  #gesture-emoji.active { transform: scale(1.1); filter: grayscale(0); }
  #gesture-name {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #fff;
  }
  #gesture-name.none { color: #444; }
  #gesture-confidence {
    font-size: 14px;
    color: #888;
    font-variant-numeric: tabular-nums;
  }
  #gesture-history {
    margin-top: 32px;
    display: flex;
    gap: 12px;
    font-size: 36px;
    opacity: 0.4;
  }
  .hist-item {
    width: 50px; height: 50px;
    display: flex; align-items: center; justify-content: center;
    background: #1a1a1a;
    border-radius: 8px;
  }

  /* === 드로잉 모드 === */
  #drawing-mode {
    background: #0a0a0a;
  }
  #draw-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  #draw-info {
    position: absolute;
    top: 12px; left: 12px;
    background: rgba(0,0,0,0.7);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    color: #ccc;
    z-index: 20;
    line-height: 1.5;
  }
  #draw-info strong { color: #4ade80; }
  #color-picker {
    position: absolute;
    top: 12px; right: 12px;
    display: flex;
    gap: 6px;
    z-index: 20;
  }
  .color-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
  }
  .color-btn.active { border-color: #fff; }

  /* 패널 */
  #panel {
    background: #0a0a0a;
    border-top: 1px solid #2a2a2a;
    padding: 10px 12px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }
  #status {
    flex: 1; font-size: 12px; color: #888; line-height: 1.4;
  }
  #status.ok { color: #4ade80; }
  #status.err { color: #ef4444; }
  button {
    padding: 8px 12px;
    background: #2563eb; color: white;
    border: none; border-radius: 6px;
    font-size: 12px; font-weight: 500; cursor: pointer;
  }
  button:disabled { background: #374151; opacity: 0.6; }
  button.secondary { background: #374151; }

  /* 카메라 프리뷰 */
  #preview {
    position: fixed;
    bottom: 70px; right: 12px;
    width: 100px; height: 140px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #2a2a2a;
    background: #000;
    z-index: 100;
    display: none;
  }
  #preview.on { display: block; }
  #video, #overlay {
    position: absolute; inset: 0; width: 100%; height: 100%;
    transform: scaleX(-1);
  }

  /* 인트로 */
  #intro {
    position: fixed; inset: 0;
    background: rgba(10,10,10,0.98);
    z-index: 1000;
    display: flex;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .intro-card { max-width: 360px; text-align: center; }
  .intro-card h1 { font-size: 22px; margin-bottom: 16px; }
  .intro-card p { color: #aaa; font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
  .intro-card ul {
    text-align: left; color: #888; font-size: 13px;
    line-height: 1.8; margin-bottom: 20px; padding-left: 20px;
  }
  .intro-card button { width: 100%; padding: 14px; font-size: 15px; }

  /* 로그 */
  #log {
    position: fixed;
    left: 12px; right: 12px; bottom: 70px;
    max-height: 180px; overflow-y: auto;
    background: rgba(0,0,0,0.9);
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 10px;
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 11px; color: #4ade80;
    z-index: 2000;
    display: none;
    white-space: pre-wrap; word-break: break-all;
  }
  #log.show { display: block; }
  #log .err { color: #ef4444; }
  #log .warn { color: #f59e0b; }
</style>
</head>
<body>

<div id="app">
  <div id="tabs">
    <div class="tab active" data-mode="pointer">👆 포인터</div>
    <div class="tab" data-mode="gesture">✋ 제스처</div>
    <div class="tab" data-mode="drawing">🎨 드로잉</div>
  </div>

  <div id="stage">
    <!-- 포인터 모드 -->
    <div id="pointer-mode" class="mode active">
      <div class="quad" data-q="TL"><span class="quad-label">좌상</span>↖</div>
      <div class="quad" data-q="TR"><span class="quad-label">우상</span>↗</div>
      <div class="quad" data-q="BL"><span class="quad-label">좌하</span>↙</div>
      <div class="quad" data-q="BR"><span class="quad-label">우하</span>↘</div>
      <div id="finger-cursor"></div>
    </div>

    <!-- 제스처 모드 -->
    <div id="gesture-mode" class="mode">
      <div id="gesture-display">
        <div id="gesture-emoji">🖐️</div>
        <div id="gesture-name" class="none">손을 보여주세요</div>
        <div id="gesture-confidence">대기 중</div>
      </div>
      <div id="gesture-history"></div>
    </div>

    <!-- 드로잉 모드 -->
    <div id="drawing-mode" class="mode">
      <canvas id="draw-canvas"></canvas>
      <div id="draw-info">
        <strong>검지만 펴기</strong>: 그리기<br>
        <strong>주먹</strong>: 멈춤<br>
        <strong>보자기</strong>: 전체 지우기
      </div>
      <div id="color-picker">
        <div class="color-btn active" data-color="#4ade80" style="background:#4ade80"></div>
        <div class="color-btn" data-color="#3b82f6" style="background:#3b82f6"></div>
        <div class="color-btn" data-color="#ef4444" style="background:#ef4444"></div>
        <div class="color-btn" data-color="#f59e0b" style="background:#f59e0b"></div>
        <div class="color-btn" data-color="#ffffff" style="background:#ffffff"></div>
      </div>
    </div>
  </div>

  <div id="panel">
    <div id="status">대기 중</div>
    <button id="toggle-preview" class="secondary">카메라</button>
    <button id="toggle-log" class="secondary">로그</button>
    <button id="clear-btn" class="secondary">지우기</button>
  </div>
</div>

<div id="preview">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<div id="intro">
  <div class="intro-card">
    <h1>✋ 손 추적 데모</h1>
    <p>한 손을 화면에 보이면<br>3가지 모드로 인식합니다.</p>
    <ul>
      <li><strong>포인터</strong>: 검지 끝으로 화면 가리키기 (엄지+검지 핀치 = 클릭)</li>
      <li><strong>제스처</strong>: 주먹/보/가위/엄지척/V/OK 인식</li>
      <li><strong>드로잉</strong>: 검지로 허공에 그림 그리기</li>
    </ul>
    <button id="start-btn">카메라 시작</button>
  </div>
</div>

<div id="log"></div>

<script>
// ========== 로깅 ==========
const logEl = document.getElementById('log');
function log(msg, type = 'info') {
  const line = document.createElement('div');
  line.className = type;
  const time = new Date().toLocaleTimeString('ko-KR');
  line.textContent = `[${time}] ${msg}`;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
  console.log(`[${type}]`, msg);
}
window.addEventListener('error', (e) => {
  log(`ERROR: ${e.message}`, 'err');
  logEl.classList.add('show');
});
window.addEventListener('unhandledrejection', (e) => {
  log(`REJECT: ${e.reason}`, 'err');
  logEl.classList.add('show');
});

// ========== DOM ==========
const startBtn = document.getElementById('start-btn');
const togglePreviewBtn = document.getElementById('toggle-preview');
const toggleLogBtn = document.getElementById('toggle-log');
const clearBtn = document.getElementById('clear-btn');
const statusEl = document.getElementById('status');
const intro = document.getElementById('intro');
const preview = document.getElementById('preview');
const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const octx = overlay.getContext('2d');
const stage = document.getElementById('stage');
const fingerCursor = document.getElementById('finger-cursor');
const drawCanvas = document.getElementById('draw-canvas');
const dctx = drawCanvas.getContext('2d');
const gestureEmoji = document.getElementById('gesture-emoji');
const gestureName = document.getElementById('gesture-name');
const gestureConfidence = document.getElementById('gesture-confidence');
const gestureHistory = document.getElementById('gesture-history');

const tabs = document.querySelectorAll('.tab');
const modes = document.querySelectorAll('.mode');

const quads = {
  TL: document.querySelector('[data-q="TL"]'),
  TR: document.querySelector('[data-q="TR"]'),
  BL: document.querySelector('[data-q="BL"]'),
  BR: document.querySelector('[data-q="BR"]'),
};

// ========== 상태 ==========
let handLandmarker = null;
let running = false;
let lastVideoTime = -1;
let currentMode = 'pointer';
let currentQuad = null;
let drawColor = '#4ade80';
let lastDrawPoint = null;
let gestureHistoryArr = [];
let lastGesture = null;
let gestureStableFrames = 0;

// 스무딩 (포인터/드로잉용)
const smoothBuf = { x: [], y: [], size: 4 };
function smooth(buf, val) {
  buf.push(val);
  if (buf.length > smoothBuf.size) buf.shift();
  return buf.reduce((a, b) => a + b, 0) / buf.length;
}

// ========== 캔버스 리사이즈 ==========
function resizeDrawCanvas() {
  const rect = drawCanvas.getBoundingClientRect();
  drawCanvas.width = rect.width;
  drawCanvas.height = rect.height;
}
window.addEventListener('resize', resizeDrawCanvas);

// ========== MediaPipe 로딩 ==========
async function loadMediaPipe() {
  log('MediaPipe 모듈 로딩...');
  const vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/vision_bundle.mjs');
  const { FilesetResolver, HandLandmarker } = vision;

  log('WASM fileset 로딩...');
  const filesetResolver = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm"
  );

  log('Hand 모델 다운로드...');
  let landmarker;
  try {
    landmarker = await HandLandmarker.createFromOptions(filesetResolver, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numHands: 1,
    });
    log('GPU 모드');
  } catch (e) {
    log(`GPU 실패, CPU로: ${e.message}`, 'warn');
    landmarker = await HandLandmarker.createFromOptions(filesetResolver, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "CPU"
      },
      runningMode: "VIDEO",
      numHands: 1,
    });
    log('CPU 모드');
  }
  return landmarker;
}

// ========== 시작 ==========
async function startApp() {
  startBtn.disabled = true;
  startBtn.textContent = '준비 중...';

  try {
    log('카메라 권한 요청');
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    video.srcObject = stream;
    await new Promise((res, rej) => {
      video.addEventListener('loadeddata', res, { once: true });
      setTimeout(() => rej(new Error('비디오 타임아웃')), 10000);
    });
    overlay.width = video.videoWidth;
    overlay.height = video.videoHeight;
    log(`비디오: ${video.videoWidth}x${video.videoHeight}`);

    if (!handLandmarker) {
      handLandmarker = await loadMediaPipe();
    }

    intro.style.display = 'none';
    resizeDrawCanvas();
    running = true;
    statusEl.textContent = '추적 중 — 손을 카메라에 보여주세요';
    statusEl.className = 'ok';
    requestAnimationFrame(loop);
  } catch (e) {
    log(`시작 실패: ${e.message}`, 'err');
    statusEl.textContent = '실패: ' + e.message;
    statusEl.className = 'err';
    startBtn.disabled = false;
    startBtn.textContent = '다시 시도';
    logEl.classList.add('show');
  }
}

// ========== 손 분석 ==========
// MediaPipe Hand 랜드마크 인덱스
// 0: WRIST
// 1-4: THUMB (CMC, MCP, IP, TIP)
// 5-8: INDEX
// 9-12: MIDDLE
// 13-16: RING
// 17-20: PINKY

// 손가락이 펴졌는지 판정
// 손가락 TIP의 y가 PIP(중간 관절)보다 위(작은 y)에 있으면 펴진 것
function getFingerStates(lm) {
  // 검지/중지/약지/소지: TIP이 PIP보다 위에 있나
  const index = lm[8].y < lm[6].y;
  const middle = lm[12].y < lm[10].y;
  const ring = lm[16].y < lm[14].y;
  const pinky = lm[20].y < lm[18].y;

  // 엄지는 좌우로 펴짐 — TIP과 IP의 x 거리
  // 오른손인지 왼손인지에 따라 방향 다르지만, MCP에서 TIP까지 x 거리로 단순화
  const thumb = Math.abs(lm[4].x - lm[2].x) > Math.abs(lm[3].x - lm[2].x);

  return { thumb, index, middle, ring, pinky };
}

// 제스처 분류
function classifyGesture(lm) {
  const f = getFingerStates(lm);
  const count = [f.thumb, f.index, f.middle, f.ring, f.pinky].filter(Boolean).length;

  // 주먹: 다 접힘
  if (count === 0) return { name: '주먹', emoji: '✊', conf: 0.9 };

  // 검지만: 포인팅
  if (f.index && !f.middle && !f.ring && !f.pinky && !f.thumb) {
    return { name: '검지', emoji: '☝️', conf: 0.9 };
  }

  // V (검지+중지): 가위
  if (f.index && f.middle && !f.ring && !f.pinky) {
    return { name: '가위(V)', emoji: '✌️', conf: 0.9 };
  }

  // 엄지척: 엄지만
  if (f.thumb && !f.index && !f.middle && !f.ring && !f.pinky) {
    return { name: '엄지척', emoji: '👍', conf: 0.85 };
  }

  // OK: 엄지와 검지가 가까이 + 나머지 펴짐
  const thumbTip = lm[4], indexTip = lm[8];
  const pinchDist = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
  if (pinchDist < 0.06 && f.middle && f.ring && f.pinky) {
    return { name: 'OK', emoji: '👌', conf: 0.85 };
  }

  // 보: 다 펴짐
  if (count >= 4) return { name: '보', emoji: '🖐️', conf: 0.9 };

  return { name: '?', emoji: '🤔', conf: 0.3 };
}

// 핀치 감지 (엄지+검지 거리)
function isPinching(lm) {
  const d = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
  return d < 0.05;
}

// ========== 오버레이 그리기 ==========
function drawHandOverlay(lm) {
  octx.clearRect(0, 0, overlay.width, overlay.height);
  if (!lm) return;

  // 연결선
  const connections = [
    [0,1],[1,2],[2,3],[3,4],          // 엄지
    [0,5],[5,6],[6,7],[7,8],          // 검지
    [5,9],[9,10],[10,11],[11,12],     // 중지
    [9,13],[13,14],[14,15],[15,16],   // 약지
    [13,17],[17,18],[18,19],[19,20],  // 소지
    [0,17],                            // 손바닥
  ];
  octx.strokeStyle = '#4ade80';
  octx.lineWidth = 2;
  for (const [a, b] of connections) {
    octx.beginPath();
    octx.moveTo(lm[a].x * overlay.width, lm[a].y * overlay.height);
    octx.lineTo(lm[b].x * overlay.width, lm[b].y * overlay.height);
    octx.stroke();
  }
  // 점
  octx.fillStyle = '#fff';
  for (const p of lm) {
    octx.beginPath();
    octx.arc(p.x * overlay.width, p.y * overlay.height, 3, 0, Math.PI * 2);
    octx.fill();
  }
}

// ========== 모드별 처리 ==========
function handlePointerMode(lm) {
  const indexTip = lm[8];
  // 좌우 반전 (거울)
  const x = (1 - indexTip.x) * stage.clientWidth;
  const y = indexTip.y * stage.clientHeight;
  const sx = smooth(smoothBuf.x, x);
  const sy = smooth(smoothBuf.y, y);

  fingerCursor.classList.add('on');
  fingerCursor.style.left = sx + 'px';
  fingerCursor.style.top = sy + 'px';

  const pinch = isPinching(lm);
  fingerCursor.classList.toggle('pinch', pinch);

  // 분면 판정
  const rect = stage.getBoundingClientRect();
  const normX = sx / rect.width;
  const normY = sy / rect.height;
  const q = (normY < 0.5 ? 'T' : 'B') + (normX < 0.5 ? 'L' : 'R');
  if (q !== currentQuad) {
    currentQuad = q;
    for (const k of Object.keys(quads)) {
      quads[k].classList.toggle('active', k === q);
    }
  }
}

function handleGestureMode(lm) {
  const g = classifyGesture(lm);

  // 안정화: 같은 제스처가 3프레임 연속이어야 확정
  if (lastGesture && lastGesture.name === g.name) {
    gestureStableFrames++;
  } else {
    gestureStableFrames = 0;
  }
  lastGesture = g;

  if (gestureStableFrames >= 3) {
    gestureEmoji.textContent = g.emoji;
    gestureEmoji.classList.add('active');
    gestureName.textContent = g.name;
    gestureName.classList.remove('none');
    gestureConfidence.textContent = `신뢰도 ${(g.conf * 100).toFixed(0)}%`;

    // 히스토리 추가 (제스처 바뀔 때만)
    if (gestureHistoryArr.length === 0 ||
        gestureHistoryArr[gestureHistoryArr.length - 1].name !== g.name) {
      gestureHistoryArr.push(g);
      if (gestureHistoryArr.length > 5) gestureHistoryArr.shift();
      renderGestureHistory();
    }
  }
}

function renderGestureHistory() {
  gestureHistory.innerHTML = '';
  for (const h of gestureHistoryArr) {
    const div = document.createElement('div');
    div.className = 'hist-item';
    div.textContent = h.emoji;
    gestureHistory.appendChild(div);
  }
}

function handleDrawingMode(lm) {
  const f = getFingerStates(lm);
  const onlyIndex = f.index && !f.middle && !f.ring && !f.pinky;
  const allOpen = f.index && f.middle && f.ring && f.pinky;
  const fist = !f.index && !f.middle && !f.ring && !f.pinky;

  // 보자기: 전체 지우기
  if (allOpen) {
    dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
    lastDrawPoint = null;
    return;
  }

  // 주먹: 멈춤
  if (fist) {
    lastDrawPoint = null;
    return;
  }

  // 검지만: 그리기
  if (onlyIndex) {
    const indexTip = lm[8];
    const x = (1 - indexTip.x) * drawCanvas.width;
    const y = indexTip.y * drawCanvas.height;
    const sx = smooth(smoothBuf.x, x);
    const sy = smooth(smoothBuf.y, y);

    if (lastDrawPoint) {
      dctx.strokeStyle = drawColor;
      dctx.lineWidth = 4;
      dctx.lineCap = 'round';
      dctx.lineJoin = 'round';
      dctx.beginPath();
      dctx.moveTo(lastDrawPoint.x, lastDrawPoint.y);
      dctx.lineTo(sx, sy);
      dctx.stroke();
    }
    lastDrawPoint = { x: sx, y: sy };
  } else {
    lastDrawPoint = null;
  }
}

// 손 안 보일 때 상태 초기화
function handleNoHand() {
  if (currentMode === 'pointer') {
    fingerCursor.classList.remove('on', 'pinch');
    for (const k of Object.keys(quads)) quads[k].classList.remove('active');
    currentQuad = null;
  } else if (currentMode === 'gesture') {
    gestureEmoji.classList.remove('active');
    gestureName.classList.add('none');
    gestureName.textContent = '손을 보여주세요';
    gestureConfidence.textContent = '대기 중';
    gestureStableFrames = 0;
  } else if (currentMode === 'drawing') {
    lastDrawPoint = null;
  }
}

// ========== 메인 루프 ==========
function loop() {
  if (!running) return;

  if (video.currentTime !== lastVideoTime) {
    lastVideoTime = video.currentTime;
    try {
      const result = handLandmarker.detectForVideo(video, performance.now());
      if (result.landmarks && result.landmarks.length > 0) {
        const lm = result.landmarks[0];
        drawHandOverlay(lm);

        if (currentMode === 'pointer') handlePointerMode(lm);
        else if (currentMode === 'gesture') handleGestureMode(lm);
        else if (currentMode === 'drawing') handleDrawingMode(lm);
      } else {
        octx.clearRect(0, 0, overlay.width, overlay.height);
        handleNoHand();
      }
    } catch (e) {
      log(`detect 오류: ${e.message}`, 'err');
    }
  }
  requestAnimationFrame(loop);
}

// ========== 탭 전환 ==========
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    const mode = tab.dataset.mode;
    tabs.forEach(t => t.classList.toggle('active', t === tab));
    modes.forEach(m => m.classList.toggle('active', m.id === `${mode}-mode`));
    currentMode = mode;
    smoothBuf.x = [];
    smoothBuf.y = [];
    handleNoHand();
    if (mode === 'drawing') resizeDrawCanvas();
    log(`모드 전환: ${mode}`);
  });
});

// ========== 색상 선택 ==========
document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    drawColor = btn.dataset.color;
  });
});

// ========== 버튼 ==========
startBtn.addEventListener('click', startApp);
togglePreviewBtn.addEventListener('click', () => preview.classList.toggle('on'));
toggleLogBtn.addEventListener('click', () => logEl.classList.toggle('show'));
clearBtn.addEventListener('click', () => {
  if (currentMode === 'drawing') {
    dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  } else if (currentMode === 'gesture') {
    gestureHistoryArr = [];
    renderGestureHistory();
  }
});

log('초기화 완료. 시작 버튼을 눌러주세요.');
</script>

</body>
