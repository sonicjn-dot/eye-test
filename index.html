<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>모바일 시선 추적</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #fff;
    touch-action: none;
  }
  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
  }

  /* 4분면 */
  #quadrants {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 2px;
    background: #2a2a2a;
  }
  .quad {
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    font-weight: 700;
    color: #444;
    transition: background 0.15s, color 0.15s;
    position: relative;
  }
  .quad.active {
    background: #2563eb;
    color: #fff;
  }
  .quad-label {
    position: absolute;
    top: 12px;
    left: 12px;
    font-size: 11px;
    font-weight: 500;
    color: #666;
    letter-spacing: 1px;
  }
  .quad.active .quad-label { color: rgba(255,255,255,0.7); }
  .gaze-time {
    position: absolute;
    bottom: 12px;
    right: 12px;
    font-size: 14px;
    color: #666;
    font-variant-numeric: tabular-nums;
  }
  .quad.active .gaze-time { color: rgba(255,255,255,0.8); }

  /* 컨트롤 패널 */
  #panel {
    background: #0a0a0a;
    border-top: 1px solid #2a2a2a;
    padding: 12px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  #status {
    flex: 1;
    font-size: 12px;
    color: #888;
    line-height: 1.4;
  }
  #status.ok { color: #4ade80; }
  #status.err { color: #ef4444; }
  button {
    padding: 10px 16px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  button:disabled { background: #374151; }
  button.secondary { background: #374151; }

  /* 미리보기 영상 (작은 PiP) */
  #preview {
    position: fixed;
    top: 12px;
    right: 12px;
    width: 100px;
    height: 130px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #2a2a2a;
    background: #000;
    z-index: 100;
    display: none;
  }
  #preview.on { display: block; }
  #video, #overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transform: scaleX(-1); /* 거울 모드 */
  }

  /* 인트로 */
  #intro {
    position: fixed;
    inset: 0;
    background: rgba(10,10,10,0.98);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .intro-card {
    max-width: 360px;
    text-align: center;
  }
  .intro-card h1 { font-size: 22px; margin-bottom: 16px; }
  .intro-card p {
    color: #aaa;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 20px;
  }
  .intro-card ul {
    text-align: left;
    color: #888;
    font-size: 13px;
    line-height: 1.8;
    margin-bottom: 24px;
    padding-left: 20px;
  }
  .intro-card button { width: 100%; padding: 14px; font-size: 15px; }
</style>
</head>
<body>

<div id="app">
  <div id="quadrants">
    <div class="quad" data-q="TL">
      <span class="quad-label">좌상</span>
      <span class="big">↖</span>
      <span class="gaze-time">0.0s</span>
    </div>
    <div class="quad" data-q="TR">
      <span class="quad-label">우상</span>
      <span class="big">↗</span>
      <span class="gaze-time">0.0s</span>
    </div>
    <div class="quad" data-q="BL">
      <span class="quad-label">좌하</span>
      <span class="big">↙</span>
      <span class="gaze-time">0.0s</span>
    </div>
    <div class="quad" data-q="BR">
      <span class="quad-label">우하</span>
      <span class="big">↘</span>
      <span class="gaze-time">0.0s</span>
    </div>
  </div>

  <div id="panel">
    <div id="status">대기 중</div>
    <button id="toggle-preview" class="secondary">카메라</button>
    <button id="reset-btn" class="secondary">리셋</button>
  </div>
</div>

<div id="preview">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<div id="intro">
  <div class="intro-card">
    <h1>👁️ 모바일 시선 추적</h1>
    <p>전면 카메라로 얼굴/홍채를 추적해서<br>화면의 4분면 중 어디를 보는지 표시합니다.</p>
    <ul>
      <li>폰을 정면에서 30~40cm</li>
      <li>밝은 조명, 안경 반사 주의</li>
      <li>머리는 가급적 고정</li>
      <li>고개 돌리기 + 눈동자 움직임 둘 다 인식</li>
    </ul>
    <button id="start-btn">카메라 시작</button>
  </div>
</div>

<script type="module">
import {
  FilesetResolver,
  FaceLandmarker
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/vision_bundle.js";

const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const octx = overlay.getContext('2d');
const statusEl = document.getElementById('status');
const startBtn = document.getElementById('start-btn');
const resetBtn = document.getElementById('reset-btn');
const togglePreviewBtn = document.getElementById('toggle-preview');
const intro = document.getElementById('intro');
const preview = document.getElementById('preview');
const quads = {
  TL: document.querySelector('[data-q="TL"]'),
  TR: document.querySelector('[data-q="TR"]'),
  BL: document.querySelector('[data-q="BL"]'),
  BR: document.querySelector('[data-q="BR"]'),
};

let faceLandmarker = null;
let running = false;
let lastVideoTime = -1;
let currentQuad = null;
let gazeTimes = { TL: 0, TR: 0, BL: 0, BR: 0 };
let lastTickTime = performance.now();

// 시선 안정화용 버퍼 (jitter 줄이기)
const smoothBuffer = { x: [], y: [], size: 6 };

function smooth(buf, val) {
  buf.push(val);
  if (buf.length > smoothBuffer.size) buf.shift();
  return buf.reduce((a, b) => a + b, 0) / buf.length;
}

async function init() {
  statusEl.textContent = 'MediaPipe 모델 다운로드 중...';
  try {
    const filesetResolver = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm"
    );
    faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        delegate: "GPU"
      },
      outputFaceBlendshapes: false,
      outputFacialTransformationMatrixes: true,
      runningMode: "VIDEO",
      numFaces: 1
    });
    statusEl.textContent = '모델 준비 완료';
    statusEl.classList.add('ok');
  } catch (e) {
    statusEl.textContent = '모델 로드 실패: ' + e.message;
    statusEl.classList.add('err');
    throw e;
  }
}

async function startCamera() {
  startBtn.disabled = true;
  startBtn.textContent = '시작 중...';

  if (!faceLandmarker) {
    try { await init(); } catch (e) { startBtn.disabled = false; startBtn.textContent = '카메라 시작'; return; }
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: 'user',
        width: { ideal: 640 },
        height: { ideal: 480 }
      },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(res => video.addEventListener('loadeddata', res, { once: true }));
    overlay.width = video.videoWidth;
    overlay.height = video.videoHeight;
    intro.style.display = 'none';
    running = true;
    statusEl.textContent = '추적 중';
    statusEl.classList.add('ok');
    requestAnimationFrame(loop);
  } catch (e) {
    statusEl.textContent = '카메라 접근 실패: ' + e.message;
    statusEl.classList.add('err');
    startBtn.disabled = false;
    startBtn.textContent = '카메라 시작';
  }
}

/**
 * 시선 방향 계산:
 * - 머리 회전 (transformation matrix의 yaw/pitch)
 * - 홍채 중심이 눈 boundary 안 어디에 있는지 (눈동자 상대 위치)
 * 두 값을 합쳐 화면 위치 추정
 */
function estimateGaze(landmarks, matrix) {
  // 홍채 중심 인덱스 (MediaPipe 478개 랜드마크 기준)
  // 왼쪽 홍채 중심: 468, 오른쪽 홍채 중심: 473
  const lIris = landmarks[468];
  const rIris = landmarks[473];

  // 왼쪽 눈 좌우 끝: 33 (외측), 133 (내측)
  // 오른쪽 눈 좌우 끝: 362 (내측), 263 (외측)
  const lEyeOuter = landmarks[33];
  const lEyeInner = landmarks[133];
  const rEyeInner = landmarks[362];
  const rEyeOuter = landmarks[263];

  // 왼쪽 눈 위아래: 159(위), 145(아래)
  // 오른쪽 눈 위아래: 386(위), 374(아래)
  const lEyeTop = landmarks[159];
  const lEyeBottom = landmarks[145];
  const rEyeTop = landmarks[386];
  const rEyeBottom = landmarks[374];

  // 홍채의 눈 내 상대 위치 (0~1로 정규화)
  // x: 왼쪽 0, 오른쪽 1
  const lRelX = (lIris.x - lEyeOuter.x) / (lEyeInner.x - lEyeOuter.x);
  const rRelX = (rIris.x - rEyeInner.x) / (rEyeOuter.x - rEyeInner.x);
  const eyeX = (lRelX + rRelX) / 2; // 평균

  // y: 위 0, 아래 1
  const lRelY = (lIris.y - lEyeTop.y) / (lEyeBottom.y - lEyeTop.y);
  const rRelY = (rIris.y - rEyeTop.y) / (rEyeBottom.y - rEyeTop.y);
  const eyeY = (lRelY + rRelY) / 2;

  // 머리 회전 (transformation matrix에서 추출)
  // matrix는 column-major 4x4
  let headYaw = 0, headPitch = 0;
  if (matrix && matrix.data) {
    const m = matrix.data;
    // yaw (Y축 회전), pitch (X축 회전) — 라디안
    headYaw = Math.atan2(m[8], m[10]);
    headPitch = Math.atan2(-m[9], Math.sqrt(m[1]*m[1] + m[5]*m[5]));
  }

  // 화면 좌표 추정 (0~1)
  // 거울 모드라 x 반전 고려: 카메라 기준 왼쪽 = 화면 오른쪽
  // 사용자 입장에서는 그대로 사용 (이미 거울로 보고 있음)
  // eyeX 0.5가 중심, 0이 왼쪽 0.5 이탈
  // 홍채 상대 위치 + 머리 yaw 합성
  let screenX = eyeX + headYaw * 0.7; // 가중치는 실험적
  let screenY = eyeY + headPitch * 0.7;

  // 0~1로 클램프
  screenX = Math.max(0, Math.min(1, screenX));
  screenY = Math.max(0, Math.min(1, screenY));

  return { x: screenX, y: screenY };
}

function quadrantOf(x, y) {
  const top = y < 0.5;
  const left = x < 0.5;
  if (top && left) return 'TL';
  if (top && !left) return 'TR';
  if (!top && left) return 'BL';
  return 'BR';
}

function updateQuadUI(q) {
  for (const k of Object.keys(quads)) {
    quads[k].classList.toggle('active', k === q);
  }
}

function updateGazeTime(q, deltaSec) {
  gazeTimes[q] += deltaSec;
  quads[q].querySelector('.gaze-time').textContent = gazeTimes[q].toFixed(1) + 's';
}

function drawOverlay(landmarks) {
  octx.clearRect(0, 0, overlay.width, overlay.height);
  if (!landmarks) return;
  // 홍채만 작게 표시
  octx.fillStyle = '#4ade80';
  for (const idx of [468, 473]) {
    const p = landmarks[idx];
    octx.beginPath();
    octx.arc(p.x * overlay.width, p.y * overlay.height, 4, 0, Math.PI * 2);
    octx.fill();
  }
}

function loop() {
  if (!running) return;

  const now = performance.now();
  const deltaSec = (now - lastTickTime) / 1000;
  lastTickTime = now;

  if (video.currentTime !== lastVideoTime) {
    lastVideoTime = video.currentTime;
    const result = faceLandmarker.detectForVideo(video, now);
    if (result.faceLandmarks && result.faceLandmarks.length > 0) {
      const landmarks = result.faceLandmarks[0];
      const matrix = result.facialTransformationMatrixes
        ? result.facialTransformationMatrixes[0]
        : null;

      const gaze = estimateGaze(landmarks, matrix);
      const sx = smooth(smoothBuffer.x, gaze.x);
      const sy = smooth(smoothBuffer.y, gaze.y);

      const q = quadrantOf(sx, sy);
      if (q !== currentQuad) {
        currentQuad = q;
        updateQuadUI(q);
      }
      updateGazeTime(q, deltaSec);
      drawOverlay(landmarks);
    } else {
      octx.clearRect(0, 0, overlay.width, overlay.height);
    }
  }

  requestAnimationFrame(loop);
}

// 이벤트
startBtn.addEventListener('click', startCamera);
resetBtn.addEventListener('click', () => {
  gazeTimes = { TL: 0, TR: 0, BL: 0, BR: 0 };
  for (const k of Object.keys(quads)) {
    quads[k].querySelector('.gaze-time').textContent = '0.0s';
  }
});
togglePreviewBtn.addEventListener('click', () => {
  preview.classList.toggle('on');
});
</script>

</body>
</html>
